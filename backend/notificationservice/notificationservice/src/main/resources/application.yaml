server:
  port: 8089

spring:
  application:
    name: notificationservice

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none

    show-sql: true

    open-in-view: false

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.fashion.notificationservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

notification:
  email:
    enabled: true
    from: no-reply@fashionstore.com

  sms:
    enabled: false

  push:
    enabled: true

  retry:
    max-attempts: 3
    delay-ms: 3000

  scheduler:
    enabled: true
    fixed-delay: 60000

jwt:
  secret: your-secret-key
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method