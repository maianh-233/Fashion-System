server:
  port: 8085

spring:
  application:
    name: paymentservice

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: INFO
    com.fashion.paymentservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

payment:
  default-currency: VND

  webhook:
    secret-key: your_webhook_secret

  gateway:
    timeout: 30000

    vnpay:
      enabled: true
      tmn-code: your_vnpay_tmn_code
      hash-secret: your_vnpay_hash_secret
      payment-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: http://localhost:8085/api/payments/vnpay-return

    momo:
      enabled: false
      partner-code: your_partner_code
      access-key: your_access_key
      secret-key: your_secret_key
      endpoint: https://test-payment.momo.vn/v2/gateway/api/create

eureka:
  client:
    enabled: true

    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

jwt:
  secret: your_jwt_secret_key