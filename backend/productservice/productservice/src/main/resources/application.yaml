spring:
  application:
    name: productservice

  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

        # =========================
        # PERFORMANCE OPTIMIZATION
        # =========================
        jdbc:
          batch_size: 30

        order_inserts: true
        order_updates: true

        # Avoid N+1 partially
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8083

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# =========================
# CUSTOM CONFIG
# =========================
app:
  pagination:
    default-page-size: 10
    max-page-size: 100

  upload:
    product-image-path: uploads/products

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
